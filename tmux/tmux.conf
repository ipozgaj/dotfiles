# set terminal to use 256 colors
set -g default-terminal "screen-256color"

# time-window for completing escape sequnces with prefix
set -sg escape-time 1000

# time-window for repeating commands without pressing prefix again
set -sg repeat-time 300

# scrollback history size
set -g history-limit 10000

# status bar refresh interval (seconds)
set -g status-interval 5

# set window and pane start index to 1
set -g base-index 1
setw -g pane-base-index 1

# renumber windows so we always have contiguous numbers
set -g renumber-windows on

# set currently running program as window title
setw -g automatic-rename on

# time-windows for displaying control messages
set -g display-time 2000
set -g display-panes-time 2000

set -g mouse off

# styling — flat, glyph-free, separator-based
set -g status-style fg=colour252,bg=colour236

set -g status-left "#[fg=colour16,bg=colour252,bold] #S #[fg=colour252,bg=colour236] #{?client_prefix,#[fg=colour203#,bold]● ,  }#{?window_zoomed_flag,#[fg=colour35#,bold]ZOOM ,}#{?pane_synchronized,#[fg=colour35#,bold]SYNC ,}"
set -g status-left-length 50

set -g status-right "#[fg=colour250] #(cut -d' ' -f1-3 /proc/loadavg) #[fg=colour244]│#[fg=colour250] %Y-%m-%d #[fg=colour244]│#[fg=colour255,bold] %H:%M #[fg=colour244]│#[fg=colour252] #(cut -f1-2 -d. <<< #H) "
set -g status-right-length 80

# macOS lacks /proc/loadavg; use sysctl instead
if-shell 'test "$(uname)" = Darwin' \
    "set -g status-right \"#[fg=colour250] #(sysctl -n vm.loadavg | awk '{print \$2, \$3, \$4}') #[fg=colour244]│#[fg=colour250] %Y-%m-%d #[fg=colour244]│#[fg=colour255,bold] %H:%M #[fg=colour244]│#[fg=colour252] #(cut -f1-2 -d. <<< #H) \""

setw -g window-status-separator " ❯ "
setw -g window-status-style fg=colour138
setw -g window-status-format         "#[fg=colour244]#I#[fg=colour250]:#W#{?window_flags,#{window_flags},}"
setw -g window-status-current-style fg=colour81,bold
setw -g window-status-current-format "#[fg=colour81,bold]#I#[fg=colour255]:#W#[fg=colour50]#F"

setw -g window-status-activity-style fg=colour255,bg=colour35,bold
setw -g window-status-bell-style fg=colour255,bg=colour1,bold

set -g pane-active-border-style fg=colour81

# start new panes in the $CWD
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# custom bindings
bind-key R source-file ~/.tmux.conf \; display "tmuxrc reloaded"
bind-key S if -F '#{pane_synchronized}' \
    'setw synchronize-panes off; display "Set option: synchronize-panes -> off"' \
    'setw synchronize-panes on; display "Set option: synchronize-panes -> on"'
